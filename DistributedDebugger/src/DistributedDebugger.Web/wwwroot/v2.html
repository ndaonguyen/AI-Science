<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Log Investigator (V2)</title>
  <!-- ?v= cache-busters: bump these when you push CSS/JS changes if your
       browser is being stubborn about reloading. The query string makes
       the URL distinct from the cached version regardless of HTTP cache
       headers. Saves having to fight browser DevTools. -->
  <link rel="stylesheet" href="styles.css?v=2">
  <link rel="stylesheet" href="v2.css?v=5">
</head>
<body>
  <header class="topbar">
    <h1>Log Investigator <span class="version-tag">V2</span></h1>
    <div class="topbar-right">
      <a href="/index.html" class="topbar-link">→ V1 (agent)</a>
    </div>
  </header>

  <main class="v2-layout">
    <!-- Left: form to filter / extend -->
    <aside class="v2-side">
      <section class="card">
        <h2>Bug context</h2>
        <label>Ticket ID (optional)
          <input id="ticketId" type="text" placeholder="COCO-1234">
        </label>
        <label>Bug description
          <textarea id="description" rows="4" placeholder="What's the user-visible problem?"></textarea>
        </label>
      </section>

      <section class="card">
        <h2>Filter logs</h2>
        <label>Services
          <div id="services" class="checkbox-group">
            <!-- populated at load -->
          </div>
        </label>
        <label>Environment
          <select id="environment">
            <option value="dev">dev</option>
            <option value="staging">staging</option>
            <option value="live" selected>live</option>
            <option value="live-ca">live-ca</option>
          </select>
        </label>
        <label>Filter text (CloudWatch)
          <input id="filterText" type="text" placeholder="e.g. Unexpected Execution Error">
        </label>
        <label>Time range
          <div class="time-row">
            <input id="startTime" type="datetime-local" step="1">
            <span class="arrow">↓</span>
            <input id="endTime" type="datetime-local" step="1">
          </div>
          <div class="quick-ranges">
            <button type="button" data-range="15m" class="chip">15m</button>
            <button type="button" data-range="1h"  class="chip">1h</button>
            <button type="button" data-range="6h"  class="chip">6h</button>
            <button type="button" data-range="24h" class="chip">24h</button>
          </div>
        </label>
        <button id="filterBtn" class="primary">Filter</button>
      </section>

      <section class="card">
        <h2>Selected (0)</h2>
        <p class="hint">Click rows in the table to mark them as selected. Then either
          extend around their timestamp, or analyze them.</p>
        <label>Extend window (± minutes)
          <!-- Preset chips for the common values + a custom input that
               wins when filled in. Same pattern as the time-range chips
               at the top of the form so the UX is consistent. -->
          <div class="extend-presets">
            <button type="button" data-mins="0"  class="chip">±0</button>
            <button type="button" data-mins="1"  class="chip active">±1</button>
            <button type="button" data-mins="2"  class="chip">±2</button>
            <button type="button" data-mins="5"  class="chip">±5</button>
            <button type="button" data-mins="10" class="chip">±10</button>
          </div>
          <input id="extendCustom" type="number" min="0" step="1"
                 placeholder="…or custom (minutes)"
                 class="extend-custom">
        </label>
        <button id="extendBtn" class="secondary" disabled>Extend</button>
        <button id="analyzeBtn" class="primary" disabled>Analyze gathered logs</button>
        <button id="clearBtn" class="secondary small">Clear all logs</button>
      </section>
    </aside>

    <!-- Right: log table + analysis output -->
    <section class="v2-main">
      <div id="status" class="status hidden"></div>

      <div class="card">
        <div class="card-header">
          <h2>Logs (<span id="logCount">0</span>)</h2>
          <span id="enforcedFilter" class="hint mono"></span>
        </div>
        <div class="logs-scroll">
          <table id="logTable" class="log-table">
            <!-- colgroup is the most authoritative way to set column widths
                 in HTML. Belt-and-braces with the CSS percentage rules in
                 case any future CSS change overrides them. Sums to 100%. -->
            <colgroup>
              <col style="width: 4%">
              <col style="width: 22%">
              <col style="width: 14%">
              <col style="width: 60%">
            </colgroup>
            <thead>
              <tr>
                <th class="col-pick"></th>
                <th class="col-ts">Timestamp (UTC)</th>
                <th class="col-svc">Service</th>
                <th class="col-msg">Message</th>
              </tr>
            </thead>
            <tbody id="logTbody">
              <tr class="empty"><td colspan="4">No logs yet — filter to begin.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="analysisCard" class="card hidden">
        <div class="card-header">
          <h2>Analysis</h2>
          <span id="analysisCost" class="hint mono"></span>
        </div>
        <div id="analysisBody"></div>
      </div>
    </section>
  </main>

  <script src="v2.js?v=6"></script>
</body>
</html>
