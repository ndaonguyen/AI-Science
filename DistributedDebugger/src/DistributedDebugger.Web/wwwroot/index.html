<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DistributedDebugger</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>DistributedDebugger</h1>
    <div class="sub">AI-powered bug investigator · web UI</div>
  </header>

  <main>
    <section id="form-section" class="card">
      <div class="mode-toggle">
        <label class="radio">
          <input type="radio" name="mode" value="guided" checked>
          <span>Guided — I drive, agent assists</span>
        </label>
        <label class="radio">
          <input type="radio" name="mode" value="autonomous">
          <span>Autonomous — agent investigates on its own</span>
        </label>
      </div>

      <h2>New investigation</h2>
      <label>
        <span>Ticket ID <em>(optional)</em></span>
        <input type="text" id="ticketId" placeholder="COCO-1234">
      </label>
      <label>
        <span>Bug description</span>
        <textarea id="description" rows="5"
          placeholder="Activity act-789 published at 14:27 UTC but not appearing in content search. Refreshing doesn't help."></textarea>
      </label>

      <div id="guided-fields">
        <label>
          <span>Services to search (CloudWatch)</span>
          <div class="checkbox-group">
            <label class="checkbox">
              <input type="checkbox" name="service" value="authoring-service" checked>
              <span>authoring-service</span>
            </label>
            <label class="checkbox">
              <input type="checkbox" name="service" value="content-media-service" checked>
              <span>content-media-service</span>
            </label>
            <label class="checkbox">
              <input type="checkbox" name="service" value="content-search-service">
              <span>content-search-service</span>
            </label>
          </div>
        </label>
        <label>
          <span>Environment</span>
          <select id="environment">
            <option value="live">live</option>
            <option value="staging">staging</option>
            <option value="test">test</option>
            <option value="live-ca-central-1">live-ca-central-1</option>
          </select>
        </label>
        <label>
          <span>Time range</span>
          <div class="time-range-row">
            <select id="timePreset">
              <option value="30m">Last 30 minutes</option>
              <option value="1h" selected>Last 1 hour</option>
              <option value="3h">Last 3 hours</option>
              <option value="6h">Last 6 hours</option>
              <option value="12h">Last 12 hours</option>
              <option value="24h">Last 24 hours</option>
              <option value="custom">Custom range…</option>
            </select>
            <span id="customRangeSummary" class="time-range-summary hidden"></span>
          </div>
          <div id="customRangePanel" class="custom-range-panel hidden">
            <div class="custom-range-grid">
              <div class="custom-range-col">
                <div class="custom-range-label">Start</div>
                <input type="date" id="startDate" class="cw-date-input">
                <input type="time" id="startTimeInput" class="cw-time-input" value="00:00">
                <div class="custom-range-hint">UTC</div>
              </div>
              <div class="custom-range-sep">→</div>
              <div class="custom-range-col">
                <div class="custom-range-label">End</div>
                <input type="date" id="endDate" class="cw-date-input">
                <input type="time" id="endTimeInput" class="cw-time-input" value="23:59">
                <div class="custom-range-hint">UTC</div>
              </div>
            </div>
            <div class="custom-range-actions">
              <button type="button" id="applyCustomRange" class="secondary small">Apply</button>
              <button type="button" id="cancelCustomRange" class="secondary small">Cancel</button>
            </div>
          </div>
        </label>
      </div>

      <div class="row">
        <label class="checkbox">
          <input type="checkbox" id="mock"> Use mock data (no AWS, free)
        </label>
        <button id="startBtn" type="button">Start investigation</button>
      </div>
      <div class="hint">Tip: narrower descriptions with IDs and timestamps produce better investigations.</div>
    </section>

    <section id="run-section" class="card hidden">
      <div class="row between">
        <h2>Investigation <span id="sessionIdBadge" class="badge"></span> <span id="modeBadge" class="badge subtle"></span></h2>
        <button id="newBtn" type="button" class="secondary">New investigation</button>
      </div>
      <div id="events"></div>

      <div id="turn-summary" class="turn-summary hidden">
        <h3>Summary</h3>
        <div class="hypothesis"><strong>Hypothesis:</strong> <span id="hypothesis-text"></span></div>
        <ul id="findings"></ul>
        <h4>What next?</h4>
        <div class="next-buttons">
          <button type="button" data-action="mongo">Check MongoDB</button>
          <button type="button" data-action="opensearch">Check OpenSearch</button>
          <button type="button" data-action="kafka">Check Kafka</button>
          <button type="button" data-action="more_logs" class="secondary">Search more logs</button>
          <button type="button" data-action="finish" class="secondary">Finish — give me the report</button>
        </div>
        <div id="more-logs-panel" class="more-logs-panel hidden">
          <div class="checkbox-group" id="more-logs-services">
            <label class="checkbox"><input type="checkbox" value="authoring-service"><span>authoring-service</span></label>
            <label class="checkbox"><input type="checkbox" value="content-media-service"><span>content-media-service</span></label>
            <label class="checkbox"><input type="checkbox" value="content-search-service"><span>content-search-service</span></label>
          </div>
          <div class="row">
            <select id="more-logs-env">
              <option value="live">live</option>
              <option value="staging">staging</option>
              <option value="test">test</option>
              <option value="live-ca-central-1">live-ca-central-1</option>
            </select>
            <select id="more-logs-preset">
              <option value="30m">Last 30 min</option>
              <option value="1h" selected>Last 1 h</option>
              <option value="3h">Last 3 h</option>
              <option value="6h">Last 6 h</option>
              <option value="12h">Last 12 h</option>
              <option value="24h">Last 24 h</option>
              <option value="custom">Custom…</option>
            </select>
            <span id="moreLogsRangeSummary" class="time-range-summary hidden"></span>
            <button type="button" id="more-logs-submit">Run search</button>
            <button type="button" id="more-logs-cancel" class="secondary">Cancel</button>
          </div>
          <div id="moreLogsCustomPanel" class="custom-range-panel hidden">
            <div class="custom-range-grid">
              <div class="custom-range-col">
                <div class="custom-range-label">Start</div>
                <input type="date" id="mlStartDate" class="cw-date-input">
                <input type="time" id="mlStartTime" class="cw-time-input" value="00:00">
                <div class="custom-range-hint">UTC</div>
              </div>
              <div class="custom-range-sep">→</div>
              <div class="custom-range-col">
                <div class="custom-range-label">End</div>
                <input type="date" id="mlEndDate" class="cw-date-input">
                <input type="time" id="mlEndTime" class="cw-time-input" value="23:59">
                <div class="custom-range-hint">UTC</div>
              </div>
            </div>
            <div class="custom-range-actions">
              <button type="button" id="applyMoreLogsRange" class="secondary small">Apply</button>
              <button type="button" id="cancelMoreLogsRange" class="secondary small">Cancel</button>
            </div>
          </div>
        </div>
        <div id="running-indicator" class="hint hidden">Running turn…</div>
      </div>

      <div id="paste-panel" class="paste-panel hidden">
        <div class="paste-header">
          <strong id="paste-source"></strong>
          <span id="paste-env" class="badge subtle"></span>
        </div>
        <div class="paste-reason" id="paste-reason"></div>
        <pre id="paste-query"></pre>
        <textarea id="paste-text" rows="6" placeholder="Paste the query result as JSON. Or click 'No match' / 'Decline'."></textarea>
        <div class="row">
          <button id="submitPasteBtn" type="button">Submit</button>
          <button id="emptyBtn" type="button" class="secondary">No match (empty)</button>
          <button id="skipBtn" type="button" class="secondary">Decline (skip)</button>
        </div>
      </div>

      <div id="report" class="report hidden"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
